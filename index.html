<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শাহবাগি ডিটেক্টর</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#ff7a00,#ff3d00);
text-align:center;
color:white;
}

.header{
padding:30px;
}

.card{
background:white;
color:black;
width:90%;
max-width:420px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.question{
font-size:20px;
margin-bottom:25px;
}

button{
padding:12px 25px;
margin:6px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.yes{
background:#ff5722;
color:white;
}

.no{
background:#444;
color:white;
}

.result{
background:#111;
color:white;
padding:20px;
border-radius:12px;
margin-top:20px;
display:none;
}

.share{
background:#ff5722;
color:white;
margin-top:10px;
}

.loading{
display:none;
margin:20px;
font-size:18px;
}

.footer{
margin-top:25px;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h1>🕵️ শাহবাগি ডিটেক্টর</h1>
<p>মজার কুইজ — আপনি কত লেভেলের শাহবাগি?</p>
</div>

<div class="card">

<div id="quiz">

<div class="question" id="question"></div>

<button class="yes" onclick="answer(1)">হ্যাঁ</button>
<button class="no" onclick="answer(0)">না</button>

</div>

<div class="loading" id="loading">
⏳ স্ক্যান করা হচ্ছে...
</div>

<div class="result" id="result">
<h2 id="percent"></h2>

<button class="share" onclick="share()">
Facebook এ শেয়ার করুন
</button>

</div>

</div>

<div class="footer">
made by anti misandry movement group
</div>

<script>

var questions = [
"আপনার গায়ে গন্ধ হয়?",
"আপনার বগলের চুল বড়?",
"আপনি হাতা কাটা জামা পরেন?",
"আপনার ওড়না থাকলেও গলায় ঝুলানো থাকে?",
"আপনার কপালে লাল টিপ আছে?",
"আপনার কাছে কি রাবারের খেলনা আছে?",
"বেগুন/শসা পছন্দ করেন?",
"আপনি কি আম্রিকা/হিজ্রাইল/রেন্ডিয়ার উনুক্কু চুষেন?"
];

var index = 0;
var score = 0;

function loadQuestion(){
document.getElementById("question").innerText = questions[index];
}

function answer(v){

score += v;
index++;

if(index < questions.length){

loadQuestion();

}else{

finishQuiz();

}

}

function finishQuiz(){

document.getElementById("quiz").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(showResult,2000);

}

function showResult(){

document.getElementById("loading").style.display="none";

var percent = Math.round((score/questions.length)*100);

var text="";

if(percent < 30){

text="😇 আপনি নির্দোষ শাহবাগি";

}
else if(percent < 70){

text="😏 আপনি মাঝারি শাহবাগি";

}
else{

text="😆 আপনি ফুল শাহবাগি";

}

document.getElementById("percent").innerText = text;

document.getElementById("result").style.display="block";

}

function share(){

var text=document.getElementById("percent").innerText;

var url="https://www.facebook.com/sharer/sharer.php?quote="+text;

window.open(url);

}

loadQuestion();

</script>

</body>
</html>
